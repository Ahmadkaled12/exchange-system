<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  auth.onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة الطلبات</title><style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
margin:0;
}

h2{
text-align:center;
margin-bottom:20px;
}

.counter{
text-align:center;
font-size:18px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:#22c55e;
font-weight:bold;
}

.rejected{
color:#ef4444;
font-weight:bold;
}

.buttons{
margin-top:10px;
}

button{
border:none;
padding:10px;
margin:3px;
border-radius:6px;
cursor:pointer;
color:white;
}

.approve{
background:#22c55e;
}

.reject{
background:#ef4444;
}

.delete{
background:#64748b;
}
</style></head>
<body><h2>لوحة إدارة الطلبات</h2><div class="counter">
عدد الطلبات: <span id="count">0</span>
</div><div id="orders"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJclfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee",
storageBucket: "ahmad-662ee.firebasestorage.app",
messagingSenderId: "740891153734",
appId: "1:740891153734:web:58db6d1f6a6b57da618147"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.approveOrder = async (id)=>{
await updateDoc(doc(db,"requests",id),{
status:"approved"
});
};

window.rejectOrder = async (id)=>{
await updateDoc(doc(db,"requests",id),{
status:"rejected"
});
};

window.deleteOrder = async (id)=>{
if(confirm("هل تريد حذف الطلب؟")){
await deleteDoc(doc(db,"requests",id));
}
};

const ordersDiv = document.getElementById("orders");

onSnapshot(collection(db,"requests"),(snapshot)=>{

ordersDiv.innerHTML = "";

document.getElementById("count").innerText = snapshot.size;

snapshot.forEach((item)=>{

const data = item.data();
const id = item.id;

let statusClass = "pending";

if(data.status === "approved"){
statusClass = "approved";
}

if(data.status === "rejected"){
statusClass = "rejected";
}

ordersDiv.innerHTML += `
<div class="card">

<p>💵 الدولار: ${data.usd}</p>

<p>💰 الليرة: ${Math.round(data.syp)}</p>

<p>📉 العمولة: ${data.fee}</p>

<p class="${statusClass}">
الحالة: ${data.status}
</p>

<div class="buttons">

<button class="approve"
onclick="approveOrder('${id}')">
✅ قبول
</button>

<button class="reject"
onclick="rejectOrder('${id}')">
❌ رفض
</button>

<button class="delete"
onclick="deleteOrder('${id}')">
🗑 حذف
</button>

</div>

</div>
`;

});

});

</script></body>
</html>
